apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "kgateway.fullname" . }}-config
  labels:
    {{- include "kgateway.labels" . | nindent 4 }}
data:
  config.json: |
    {{- $config := deepCopy .Values.config }}
    {{- if eq .Values.database.mode "postgres" }}
    {{- $_ := set $config "database" .Values.database.url }}
    {{- else if .Values.persistence.enabled }}
    {{- $_ := set $config "database" (printf "sqlite://%s/kgateway.db?mode=rwc" .Values.persistence.mountPath) }}
    {{- end }}
    {{ toJson $config | nindent 4 }}
